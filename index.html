<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
    <title>Object Oriented Programming</title>
    <style>
        div {
            background-color: rgb(2, 16, 162);
            color: rgb(162, 170, 255);
            font-size: 24px;
        }
    </style>
</head>
<body>
    <form>
        <input type="text" id="input1" placeholder="Name of Dog"><br>
        <input type="number" id="input2" placeholder="Age"><br>
        <input type="text" id="input3" placeholder="Color"><br>
        <input type="text" id="input4" placeholder="Breed"><br>
        <input type="button" py-click="dog" value="Enter">
    </form>
    <div id="output5"></div>
    <py-script src="main.py"></py-script>
</body>
</html>
